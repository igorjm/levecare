name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # OIDC federation with AWS — no long-lived keys
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/go/go.sum

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Go services
        run: ./scripts/build-go.sh

      - name: Build Java patients-service
        run: mvn -q -DskipTests package
        working-directory: services/patients

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}
          NEXT_PUBLIC_USER_POOL_ID: ${{ vars.USER_POOL_ID }}
          NEXT_PUBLIC_USER_POOL_CLIENT_ID: ${{ vars.USER_POOL_CLIENT_ID }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: CDK deploy
        run: |
          npm ci
          npx cdk deploy --all --require-approval never
        working-directory: infra
