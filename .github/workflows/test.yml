name: Test

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/go/go.sum
      - name: Test and vet
        run: |
          go test ./...
          go vet ./...
        working-directory: services/go

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test
        run: mvn -q verify
        working-directory: services/patients

  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Typecheck CDK
        run: |
          npm ci
          npx tsc --noEmit
        working-directory: infra
